<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            display: block;
            margin: 0 auto;
            background-color: black;
            color: white;
            padding: 10px;
            justify-content: center;
        }
        /*pseudoclass*/
        button:hover {
            background-color: blue;
            color: black;
            border: 2px solid red;
        }
    </style>
</head>
<body>
    <button>click here</button>
</body>
</html>
